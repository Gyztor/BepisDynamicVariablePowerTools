# This file is used by the Thunderstore CLI to build and publish your mod to Thunderstore. https://github.com/thunderstore-io/thunderstore-cli

[config]
schemaVersion = "0.0.1"

[package]
namespace = "BowenArrows"
name = "BepisDynamicVariablePowerTools"
versionNumber = "1.0.0" # Uncomment this if publishing via manual tcli! Change this to your mod's version, must be in semantic versioning format (e.g. 1.0.0, 2.1.3, 0.1.0-alpha.1)
description = "A Resonite mod that adds a variety of powerful functions to dynamic variables and their spaces."
websiteUrl = "https://github.com/BowenArrows2K/BepisDynamicVariablePowerTools"
containsNsfwContent = false

# List any dependencies your mod has here, in the format "namespace-modname" = "version-constraint"
[package.dependencies] 
ResoniteModding-BepisLoader = "1.6.0"
ResoniteModding-BepisResoniteWrapper = "1.0.2"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

# Copy the compiled DLL to the plugins folder in the mod package
[[build.copy]]
source = "./BepisDynamicVariablePowerTools/bin/Release/BepisDynamicVariablePowerTools.dll"
target = "plugins/BepisDynamicVariablePowerTools/"

# Include the PDB file for better debugging support
[[build.copy]]
source = "./BepisDynamicVariablePowerTools/bin/Release/BepisDynamicVariablePowerTools.pdb"
target = "plugins/BepisDynamicVariablePowerTools/"

# Uncomment the following lines to include CHANGELOG file in your mod package. https://wiki.thunderstore.io/mods/updating-a-package#changelog
[[build.copy]]
source = "./CHANGELOG.md"
target = "/"

# Uncomment the following line to include LICENSE file in your mod package, if you have one.
[[build.copy]]
source = "./LICENSE"
target = "/"

[publish]
repository = "https://thunderstore.io"
communities = ["resonite"]

[publish.categories]
resonite = [ "mods" , "technicaltweaks" , "tools" ] # TODO: Change this to your mod's categories, see https://thunderstore.io/api/experimental/community/resonite/category/ for a list of available categories
